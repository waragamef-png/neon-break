<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">NEON BREAK アイコン</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#182b50"/>
      <stop offset="1" stop-color="#080d19"/>
    </linearGradient>
    <linearGradient id="paddle" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#51e7ff"/>
      <stop offset=".5" stop-color="#e7ffff"/>
      <stop offset="1" stop-color="#9b7bff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <g opacity=".95" filter="url(#glow)">
    <rect x="92" y="104" width="94" height="48" rx="12" fill="#51e7ff"/>
    <rect x="209" y="104" width="94" height="48" rx="12" fill="#6d9cff"/>
    <rect x="326" y="104" width="94" height="48" rx="12" fill="#9b7bff"/>
    <rect x="92" y="176" width="94" height="48" rx="12" fill="#9b7bff"/>
    <rect x="209" y="176" width="94" height="48" rx="12" fill="#ff5dba"/>
    <rect x="326" y="176" width="94" height="48" rx="12" fill="#ff9c66"/>
    <circle cx="265" cy="303" r="24" fill="#d8ffff"/>
    <rect x="118" y="377" width="276" height="34" rx="17" fill="url(#paddle)"/>
  </g>
</svg>
