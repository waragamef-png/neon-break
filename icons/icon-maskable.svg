<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">NEON BREAK マスカブルアイコン</title>
  <defs>
    <radialGradient id="bg" cx=".35" cy=".2" r="1">
      <stop stop-color="#223d70"/>
      <stop offset="1" stop-color="#080d19"/>
    </radialGradient>
    <linearGradient id="paddle" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#51e7ff"/>
      <stop offset=".5" stop-color="#fff"/>
      <stop offset="1" stop-color="#9b7bff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <rect x="132" y="145" width="72" height="38" rx="9" fill="#51e7ff"/>
    <rect x="220" y="145" width="72" height="38" rx="9" fill="#6d9cff"/>
    <rect x="308" y="145" width="72" height="38" rx="9" fill="#9b7bff"/>
    <rect x="132" y="199" width="72" height="38" rx="9" fill="#9b7bff"/>
    <rect x="220" y="199" width="72" height="38" rx="9" fill="#ff5dba"/>
    <rect x="308" y="199" width="72" height="38" rx="9" fill="#ff9c66"/>
    <circle cx="260" cy="298" r="19" fill="#e5ffff"/>
    <rect x="154" y="360" width="204" height="28" rx="14" fill="url(#paddle)"/>
  </g>
</svg>
